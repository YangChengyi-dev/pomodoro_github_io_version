<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习时间统计 - 主页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .container {
            max-width: 900px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: none;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #667eea;
            border-color: #667eea;
        }
        .btn-primary:hover {
            background-color: #5a67d8;
            border-color: #5a67d8;
        }
        .btn-danger {
            background-color: #e53e3e;
            border-color: #e53e3e;
        }
        .btn-danger:hover {
            background-color: #c53030;
            border-color: #c53030;
        }
        .current-study {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }
        .study-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .study-item:last-child {
            border-bottom: none;
        }
        .duration-badge {
            background-color: #48bb78;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: bold;
        }
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .start-study-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-study-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }
        .subject-wrapper {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="#" class="btn btn-outline-light logout-btn" id="logout-btn">退出登录</a>
        
        <div class="header">
            <h1 class="mb-2">学习时间统计</h1>
            <h3>欢迎回来，<span id="username-display"></span></h3>
            <p class="lead" id="current-time"></p>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="card-title mb-0">每日签到</h4>
                    <div>
                        <span class="badge bg-secondary me-2">累计签到: <span id="total-checkin-days">0</span> 天</span>
                        <span class="badge bg-success">连续签到: <span id="consecutive-checkin-days">0</span> 天</span>
                    </div>
                </div>
                <div class="mt-3">
                    <div id="checkin-section">
                        <a href="#" class="btn btn-primary btn-lg w-100" id="checkin-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-calendar-check me-2" viewBox="0 0 16 16">
                                <path d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                                <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
                            </svg>
                            立即签到
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="alert alert-success mb-4 d-none" id="message-alert" role="alert">
            消息内容
        </div>
        
        <div id="study-status-section">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title mb-3">开始新的学习</h4>
                    <form id="start-study-form">
                        <div class="mb-3">
                            <label for="subject" class="form-label">学科名称</label>
                            <input type="text" class="form-control" id="subject" name="subject" placeholder="例如：数学、英语、编程" required>
                        </div>
                        <button type="submit" class="btn btn-primary">开始学习</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">今日学习记录</div>
            <div class="card-body" id="today-study-records">
                <div class="text-center text-muted py-4">
                    <p>今天还没有学习记录</p>
                </div>
            </div>
        </div>
        
        <div class="card d-none" id="subjects-card">
            <div class="card-header">我的学科</div>
            <div class="card-body" id="subjects-container">
                <div class="d-flex flex-wrap gap-2">
                </div>
            </div>
        </div>
        
        <!-- 学习统计图表区域 -->
        <div class="card">
            <div class="card-header">
                <div class="nav nav-pills" id="stats-tabs" role="tablist">
                    <button class="nav-link active" id="day1-tab" data-bs-toggle="tab" data-bs-target="#day1-content" type="button" role="tab" aria-controls="day1-content" aria-selected="true">近1天</button>
                    <button class="nav-link" id="day7-tab" data-bs-toggle="tab" data-bs-target="#day7-content" type="button" role="tab" aria-controls="day7-content" aria-selected="false">近7天</button>
                    <button class="nav-link" id="day30-tab" data-bs-toggle="tab" data-bs-target="#day30-content" type="button" role="tab" aria-controls="day30-content" aria-selected="false">近30天</button>
                </div>
            </div>
            <div class="card-body">
                <div class="tab-content" id="stats-tabContent">
                    <!-- 近1天统计 -->
                    <div class="tab-pane fade show active" id="day1-content" role="tabpanel" aria-labelledby="day1-tab">
                        <div class="row mb-4">
                            <div class="col-lg-6 mb-4">
                                <h5>学习时间分布</h5>
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="day1-date-chart"></canvas>
                                </div>
                            </div>
                            <div class="col-lg-6 mb-4">
                                <h5>学科分布</h5>
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="day1-subject-chart"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <h5>总学习时间：
                                <span class="badge bg-primary" id="day1-total-duration">0.00 分钟</span>
                            </h5>
                        </div>
                    </div>
                    
                    <!-- 近7天统计 -->
                    <div class="tab-pane fade" id="day7-content" role="tabpanel" aria-labelledby="day7-tab">
                        <div class="row mb-4">
                            <div class="col-lg-6 mb-4">
                                <h5>学习时间分布</h5>
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="day7-date-chart"></canvas>
                                </div>
                            </div>
                            <div class="col-lg-6 mb-4">
                                <h5>学科分布</h5>
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="day7-subject-chart"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <h5>总学习时间：
                                <span class="badge bg-primary" id="day7-total-duration">0.00 分钟</span>
                            </h5>
                        </div>
                    </div>
                    
                    <!-- 近30天统计 -->
                    <div class="tab-pane fade" id="day30-content" role="tabpanel" aria-labelledby="day30-tab">
                        <div class="row mb-4">
                            <div class="col-lg-6 mb-4">
                                <h5>学习时间分布</h5>
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="day30-date-chart"></canvas>
                                </div>
                            </div>
                            <div class="col-lg-6 mb-4">
                                <h5>学科分布</h5>
                                <div class="chart-container" style="height: 300px;">
                                    <canvas id="day30-subject-chart"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <h5>总学习时间：
                                <span class="badge bg-primary" id="day30-total-duration">0.00 分钟</span>
                            </h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
